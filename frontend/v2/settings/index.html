<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>设置 — Ombre Brain</title>
<link rel="manifest" href="/v2/manifest.json"><link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
<script src="/v2/auth-token.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ===== v2 base CSS (shared with all modules) ===== */
:root {
  --bg:#f4f3f7;--bg-2:#ecebf1;--paper:#fff;--paper-2:#f8f7fb;
  --ink:#1a1922;--ink-2:color-mix(in oklab,var(--ink) 85%,var(--bg) 15%);--ink-3:color-mix(in oklab,var(--ink) 65%,var(--bg) 35%);--ink-4:color-mix(in oklab,var(--ink) 48%,var(--bg) 52%);
  --line:rgba(26,25,34,0.08);--line-2:rgba(26,25,34,0.16);
  --accent:#6e4f9a;--accent-2:#8265b3;--accent-3:var(--accent-a10);
  --gold:#6e4f9a;--gold-soft:#b8a3d8;--rose:#d291b3;--rose-deep:#b06998;--sage:#8a8898;--amber:#6e4f9a;
  --serif:"Cormorant Garamond","Noto Serif SC",Georgia,serif;
  --sans:"Inter","Noto Sans SC",-apple-system,system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;
}
[data-theme="dark"] {
  --bg:#14131c;--bg-2:#1d1c27;--paper:#1d1c27;--paper-2:#1d1c27;
  --ink:#ece9f2;--ink-2:#c8c5d4;--ink-3:#8c889c;--ink-4:#5d5a6e;
  --line:rgba(236,233,242,0.08);--line-2:rgba(236,233,242,0.16);
  --accent:#a78bd0;--accent-2:#c4b3e0;--rose:#d291b3;--rose-deep:#b06998;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 700px at 90% -10%,rgba(176,120,200,0.10),transparent 60%),radial-gradient(900px 700px at -10% 110%,var(--rose-a08),transparent 60%),var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
.ob-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;border-bottom:0.5px solid var(--line);background:rgba(244,243,247,0.7);backdrop-filter:blur(14px);position:sticky;top:0;z-index:50}
[data-theme="dark"] .ob-topbar{background:rgba(20,19,28,0.7)}
.ob-brand{display:flex;align-items:center;gap:14px}
.ob-brand-mark{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 180deg,var(--ink),var(--ink) 50%,transparent 50%,transparent);box-shadow:inset 0 0 0 1.5px var(--ink)}
.ob-brand-name{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:0.02em;color:var(--ink)}
.ob-brand-stats{display:flex;gap:14px;font-size:12px;color:var(--ink-3);padding-left:14px;border-left:0.5px solid var(--line-2);font-family:var(--mono)}
.ob-brand-stats b{color:var(--ink-2);font-weight:600}
.ob-nav{display:flex;gap:4px;padding:0 36px;border-bottom:0.5px solid var(--line);background:rgba(255,255,255,0.4)}
[data-theme="dark"] .ob-nav{background:rgba(29,28,39,0.4)}
.ob-nav a{padding:12px 14px;color:var(--ink-3);text-decoration:none;font-size:13px;border-bottom:1.5px solid transparent;margin-bottom:-0.5px;transition:color .15s;white-space:nowrap}
.ob-nav a:hover{color:var(--ink)}
.ob-nav a.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}

/* ===== Settings-specific ===== */
.st-page{max-width:800px;margin:0 auto;padding:32px 20px;overflow-y:auto;height:calc(100vh - 100px)}
.st-hd{text-align:center;margin-bottom:28px}
.st-hd h1{font-family:var(--serif);font-size:28px}
.st-section{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
.st-section h3{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:4px}
.st-section .st-sub{font-size:11px;color:var(--ink-3);margin-bottom:14px}
.st-row{display:flex;align-items:center;gap:12px;padding:6px 0;flex-wrap:wrap}
.st-row label{font-size:12px;color:var(--ink-3);min-width:80px}
.st-row input[type="text"],.st-row input[type="password"]{flex:1;min-width:180px;padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:var(--bg);color:var(--ink);font-family:var(--mono)}
.st-row input:focus{border-color:var(--accent);outline:none}
.st-btn{padding:7px 16px;border-radius:6px;border:1px solid var(--line);font-size:12px;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--ink-3)}
.st-btn:hover{color:var(--accent);border-color:var(--accent)}
.st-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.st-btn.danger{color:var(--rose);border-color:var(--rose)}
.st-status{font-size:11px;padding:3px 10px;border-radius:8px;display:inline-block}
.st-status.on{background:#e8f5e9;color:#4caf50}
.st-status.off{background:#f5f5f5;color:var(--ink-3)}
[data-theme="dark"] .st-status.on{background:#1b3a20}
[data-theme="dark"] .st-status.off{background:#2a2a30}
.st-loading{text-align:center;padding:60px;color:var(--ink-3);font-family:var(--serif)}
.st-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.st-tabs button{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--ink-3);cursor:pointer}
.st-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head><body><div id="root"></div>
<script type="text/babel" src="/v2/theme-system.js"></script>
<script type="text/babel" src="/v2/shared-nav.jsx"></script>
<script type="text/babel" src="/v2/settings/settings-app.jsx"></script>
</body></html>
