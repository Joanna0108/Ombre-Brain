<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>设置 — Ombre Brain</title>
<link rel="manifest" href="/v2/manifest.json"><link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
<script src="/v2/auth-token.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#faf8f5;--surface:#fff;--line:#e8e5df;--ink:#2d2a35;--ink-dim:#8a8796;--accent:#7c6fb8;--accent-soft:#ebe6f7;--rose:#d291b3;--gold:#d4a85f;--green:#4caf50;--serif:'Cormorant Garamond','Noto Serif SC',Georgia,serif;--sans:'Inter',system-ui,-apple-system,sans-serif;--mono:'JetBrains Mono','Courier New',monospace;--radius:10px}
[data-theme="dark"]{--bg:#1d1c27;--surface:#262433;--line:#363348;--ink:#e4e1f0;--ink-dim:#8a8796;--accent:#a78bd0;--accent-soft:#2d2840}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink)}
.st-topbar{display:flex;align-items:center;gap:6px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.st-brand{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--accent);margin-right:16px;white-space:nowrap;text-decoration:none}
.st-topbar a{text-decoration:none;color:var(--ink-dim);font-size:13px;padding:4px 10px;border-radius:6px;transition:color .15s,background .15s;white-space:nowrap}
.st-topbar a:hover,.st-topbar a.on{color:var(--accent);background:var(--accent-soft)}
.st-nav-group{display:flex;gap:2px}.st-nav-divider{width:1px;height:18px;background:var(--line);margin:0 8px}
.st-page{max-width:800px;margin:0 auto;padding:32px 20px}
.st-hd{text-align:center;margin-bottom:28px}
.st-hd h1{font-family:var(--serif);font-size:28px}
.st-section{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
.st-section h3{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:4px}
.st-section .st-sub{font-size:11px;color:var(--ink-dim);margin-bottom:14px}
.st-row{display:flex;align-items:center;gap:12px;padding:6px 0;flex-wrap:wrap}
.st-row label{font-size:12px;color:var(--ink-dim);min-width:80px}
.st-row input[type="text"],.st-row input[type="password"]{flex:1;min-width:180px;padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:var(--bg);color:var(--ink);font-family:var(--mono)}
.st-row input:focus{border-color:var(--accent);outline:none}
.st-btn{padding:7px 16px;border-radius:6px;border:1px solid var(--line);font-size:12px;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--ink-dim)}
.st-btn:hover{color:var(--accent);border-color:var(--accent)}
.st-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.st-btn.danger{color:var(--rose);border-color:var(--rose)}
.st-status{font-size:11px;padding:3px 10px;border-radius:8px;display:inline-block}
.st-status.on{background:#e8f5e9;color:var(--green)}
.st-status.off{background:#f5f5f5;color:var(--ink-dim)}
[data-theme="dark"] .st-status.on{background:#1b3a20}
[data-theme="dark"] .st-status.off{background:#2a2a30}
.st-loading{text-align:center;padding:60px;color:var(--ink-dim);font-family:var(--serif)}
.st-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.st-tabs button{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--ink-dim);cursor:pointer}
.st-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head><body><div id="root"></div>
<script src="/v2/theme-system.js"></script>
<script type="text/babel" src="/v2/settings/settings-app.jsx"></script>
</body></html>
