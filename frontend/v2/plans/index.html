<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>计划 — Ombre Brain</title>
<link rel="manifest" href="/v2/manifest.json"><link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
<script src="/v2/auth-token.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ===== v2 base CSS (shared with all modules) ===== */
:root {
  --bg:#f4f3f7;--bg-2:#ecebf1;--paper:#fff;--paper-2:#f8f7fb;
  --ink:#1a1922;--ink-2:color-mix(in oklab,var(--ink) 85%,var(--bg) 15%);--ink-3:color-mix(in oklab,var(--ink) 65%,var(--bg) 35%);--ink-4:color-mix(in oklab,var(--ink) 48%,var(--bg) 52%);
  --line:rgba(26,25,34,0.08);--line-2:rgba(26,25,34,0.16);
  --accent:#6e4f9a;--accent-2:#8265b3;--accent-3:var(--accent-a10);
  --gold:#6e4f9a;--gold-soft:#b8a3d8;--rose:#d291b3;--rose-deep:#b06998;--sage:#8a8898;--amber:#6e4f9a;
  --serif:"Cormorant Garamond","Noto Serif SC",Georgia,serif;
  --sans:"Inter","Noto Sans SC",-apple-system,system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;
}
[data-theme="dark"] {
  --bg:#14131c;--bg-2:#1d1c27;--paper:#1d1c27;--paper-2:#1d1c27;
  --ink:#ece9f2;--ink-2:#c8c5d4;--ink-3:#8c889c;--ink-4:#5d5a6e;
  --line:rgba(236,233,242,0.08);--line-2:rgba(236,233,242,0.16);
  --accent:#a78bd0;--accent-2:#c4b3e0;--rose:#d291b3;--rose-deep:#b06998;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 700px at 90% -10%,rgba(176,120,200,0.10),transparent 60%),radial-gradient(900px 700px at -10% 110%,var(--rose-a08),transparent 60%),var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased}
.ob-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;border-bottom:0.5px solid var(--line);background:rgba(244,243,247,0.7);backdrop-filter:blur(14px);position:sticky;top:0;z-index:50}
[data-theme="dark"] .ob-topbar{background:rgba(20,19,28,0.7)}
.ob-brand{display:flex;align-items:center;gap:14px}
.ob-brand-mark{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 180deg,var(--ink),var(--ink) 50%,transparent 50%,transparent);box-shadow:inset 0 0 0 1.5px var(--ink)}
.ob-brand-name{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:0.02em;color:var(--ink)}
.ob-brand-stats{display:flex;gap:14px;font-size:12px;color:var(--ink-3);padding-left:14px;border-left:0.5px solid var(--line-2);font-family:var(--mono)}
.ob-brand-stats b{color:var(--ink-2);font-weight:600}
.ob-nav{display:flex;gap:4px;padding:0 36px;border-bottom:0.5px solid var(--line);background:rgba(255,255,255,0.4)}
[data-theme="dark"] .ob-nav{background:rgba(29,28,39,0.4)}
.ob-nav a{padding:12px 14px;color:var(--ink-3);text-decoration:none;font-size:13px;border-bottom:1.5px solid transparent;margin-bottom:-0.5px;transition:color .15s;white-space:nowrap}
.ob-nav a:hover{color:var(--ink)}
.ob-nav a.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.ob-topbar-actions{display:flex;align-items:center;gap:12px}
.ob-theme-panel{position:absolute;top:calc(100% + 8px);right:0;background:var(--paper);border:0.5px solid var(--line-2);border-radius:999px;box-shadow:0 12px 32px -8px rgba(26,25,34,0.18);z-index:100;animation:obThemeFadeIn .14s ease-out;transition:border-radius .2s ease,width .2s ease}
.ob-theme-panel.is-expanded{border-radius:16px;width:320px}
.ob-theme-panel-swatches{display:flex;align-items:center;gap:12px;padding:8px 12px;white-space:nowrap}
.ob-theme-panel.is-expanded .ob-theme-panel-swatches{border-bottom:0.5px solid var(--line);justify-content:space-between;padding:10px 14px}
@keyframes obThemeFadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ob-theme-swatch{appearance:none;width:22px;height:22px;padding:0;border-radius:50%;border:0.5px solid rgba(0,0,0,0.18);cursor:pointer;transition:transform .12s,box-shadow .12s}
.ob-theme-swatch:hover{transform:scale(1.08)}
.ob-theme-swatch.on{box-shadow:0 0 0 1.5px var(--paper),0 0 0 3px var(--ink);border-color:transparent}
.ob-theme-swatch.is-drawer-open{box-shadow:0 0 0 1.5px var(--paper),0 0 0 3px var(--accent);transform:scale(1.08)}
.ob-dark-btn{appearance:none;border:0;width:36px;height:36px;border-radius:50%;background:var(--paper);border:0.5px solid var(--line-2);color:var(--ink-2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ob-dark-btn:hover{background:var(--ink);color:var(--paper);transform:rotate(20deg)}
.ob-dark-btn.on{background:var(--accent-3);color:var(--accent);border-color:var(--accent)}
.ob-theme-toggle-wrap{position:relative;display:inline-block}
.ob-theme-btn{appearance:none;border:0;width:36px;height:36px;border-radius:50%;background:var(--paper);border:0.5px solid var(--line-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0}
.ob-theme-btn:hover{transform:rotate(20deg);border-color:var(--ink-3)}
.ob-theme-btn-mark{width:16px;height:16px;border-radius:50%;background:conic-gradient(from 0deg,var(--accent),var(--rose),var(--gold),var(--accent));border:0.5px solid var(--ink-4)}

/* ===== Plans-specific ===== */
.pl-page{max-width:800px;margin:0 auto;padding:32px 20px}
.pl-hd h1{font-family:var(--serif);font-size:28px;text-align:center;margin-bottom:4px}
.pl-hd p{text-align:center;font-size:12px;color:var(--ink-3);margin-bottom:32px}
.pl-section{margin-bottom:24px}
.pl-section h3{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:12px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px}
.pl-card{background:var(--paper);border:0.5px solid var(--line);border-radius:var(--r-md);padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.pl-card:hover{box-shadow:0 1px 4px rgba(0,0,0,.06)}
.pl-card .pl-card-title{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px}
.pl-card .pl-card-title .pl-status{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--accent-3);color:var(--accent)}
.pl-card .pl-card-title .pl-status.resolved{background:#e8f5e9;color:#4caf50}
.pl-card .pl-card-title .pl-status.abandoned{background:#fbe9e7;color:#ef5350}
.pl-card .pl-card-preview{font-size:12px;color:var(--ink-3);margin-top:6px}
.pl-card .pl-card-meta{font-size:11px;color:var(--ink-3);margin-top:6px;display:flex;gap:16px}
.pl-loading{text-align:center;padding:60px;color:var(--ink-3);font-family:var(--serif);font-size:18px}
</style>
</head><body><div id="root"></div>
<script type="text/babel" src="/v2/theme-system.js"></script>
<script type="text/babel" src="/v2/shared-nav.jsx"></script>
<script type="text/babel" src="/v2/plans/plans-app.jsx"></script>
</body></html>
