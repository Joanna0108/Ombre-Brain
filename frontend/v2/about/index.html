<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>关于 — Ombre Brain</title>
<link rel="manifest" href="/v2/manifest.json"><link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
<script src="/v2/auth-token.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#faf8f5;--surface:#fff;--line:#e8e5df;--ink:#2d2a35;--ink-dim:#8a8796;--accent:#7c6fb8;--accent-soft:#ebe6f7;--serif:'Cormorant Garamond','Noto Serif SC',Georgia,serif;--sans:'Inter',system-ui,-apple-system,sans-serif}
[data-theme="dark"]{--bg:#1d1c27;--surface:#262433;--line:#363348;--ink:#e4e1f0;--ink-dim:#8a8796;--accent:#a78bd0;--accent-soft:#2d2840}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink)}
.ab-topbar{display:flex;align-items:center;gap:6px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.ab-brand{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--accent);margin-right:16px;white-space:nowrap;text-decoration:none}
.ab-topbar a{text-decoration:none;color:var(--ink-dim);font-size:13px;padding:4px 10px;border-radius:6px;transition:color .15s,background .15s;white-space:nowrap}
.ab-topbar a:hover,.ab-topbar a.on{color:var(--accent);background:var(--accent-soft)}
.ab-nav-group{display:flex;gap:2px}.ab-nav-divider{width:1px;height:18px;background:var(--line);margin:0 8px}
.ab-page{max-width:600px;margin:0 auto;padding:48px 20px;text-align:center}
.ab-page h1{font-family:var(--serif);font-size:36px;font-weight:600;margin-bottom:12px}
.ab-page .ab-version{font-size:13px;color:var(--ink-dim);margin-bottom:32px;font-family:var(--mono, monospace)}
.ab-page .ab-note{font-family:var(--serif);font-size:16px;line-height:1.9;color:var(--ink);margin-bottom:32px;font-style:italic}
.ab-page .ab-meta{font-size:12px;color:var(--ink-dim);line-height:1.8}
.ab-loading{text-align:center;padding:60px;color:var(--ink-dim);font-family:var(--serif);font-size:18px}
</style>
</head><body><div id="root"></div>
<script src="/v2/theme-system.js"></script>
<script type="text/babel" src="/v2/about/about-app.jsx"></script>
</body></html>
