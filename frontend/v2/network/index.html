<!DOCTYPE html>
<html lang="zh-CN" dir="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>记忆网络 — Ombre Brain</title>
<link rel="manifest" href="/v2/manifest.json">
<link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
<link rel="shortcut icon" href="/v2/favicon.ico">
<link rel="apple-touch-icon" href="/v2/favicon-180.png">

<!-- Shared auth + theme (must load before React) -->
<script src="/v2/auth-token.js"></script>

<!-- D3.js v7 CDN -->
<script src="https://d3js.org/d3.v7.min.js"></script>

<!-- React + Babel (same as other v2 views) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ========== CSS Variables (theme-system compatible) ========== */
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --line: #e8e5df;
  --ink: #2d2a35;
  --ink-dim: #8a8796;
  --accent: #7c6fb8;
  --accent-soft: #ebe6f7;
  --serif: 'Cormorant Garamond', 'Noto Serif SC', Georgia, serif;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
}

[data-theme="dark"] {
  --bg: #1d1c27;
  --surface: #262433;
  --line: #363348;
  --ink: #e4e1f0;
  --ink-dim: #8a8796;
  --accent: #a78bd0;
  --accent-soft: #2d2840;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  overflow: hidden;
  height: 100vh;
}

/* ========== Top Nav Bar ========== */
.nw-topbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 20px; background: var(--surface);
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 100;
  flex-wrap: wrap;
}
.nw-brand {
  font-family: var(--serif); font-size: 18px; font-weight: 600;
  color: var(--accent); margin-right: 16px; white-space: nowrap;
  text-decoration: none;
}
.nw-topbar a {
  text-decoration: none; color: var(--ink-dim); font-size: 13px;
  padding: 4px 10px; border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}
.nw-topbar a:hover, .nw-topbar a.on {
  color: var(--accent); background: var(--accent-soft);
}
.nw-nav-group { display: flex; gap: 2px; }
.nw-nav-divider { width: 1px; height: 18px; background: var(--line); margin: 0 8px; }

/* ========== Main layout ========== */
.nw-main { display: flex; height: calc(100vh - 92px); position: relative; }

/* ========== Left panel ========== */
.nw-left {
  width: 260px; min-width: 260px;
  background: var(--surface); border-right: 1px solid var(--line);
  padding: 16px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
}
.nw-left h3 {
  font-family: var(--serif); font-size: 14px; font-weight: 600;
  color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.5px;
}
.nw-left label { font-size: 12px; color: var(--ink-dim); display: block; margin-bottom: 4px; }
.nw-left input[type="text"] {
  width: 100%; padding: 8px 10px; border: 1px solid var(--line);
  border-radius: 6px; font-size: 13px; background: var(--bg);
  color: var(--ink); outline: none;
}
.nw-left input[type="text"]:focus { border-color: var(--accent); }

.nw-filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.nw-chip {
  font-size: 11px; padding: 4px 10px; border-radius: 14px;
  border: 1px solid var(--line); background: var(--bg);
  color: var(--ink-dim); cursor: pointer; transition: all 0.15s;
}
.nw-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }

.nw-stats { font-size: 12px; color: var(--ink-dim); }
.nw-stats span { font-weight: 600; color: var(--ink); }

/* ========== SVG canvas area ========== */
.nw-canvas-wrap {
  flex: 1; position: relative; background: var(--bg);
  cursor: grab; overflow: hidden;
}
.nw-canvas-wrap:active { cursor: grabbing; }
.nw-canvas-wrap svg { width: 100%; height: 100%; display: block; }

/* ========== Right drawer ========== */
.nw-right {
  width: 0; overflow: hidden; transition: width 0.25s ease;
  background: var(--surface); border-left: 1px solid var(--line);
}
.nw-right.open { width: 360px; }
.nw-right-inner { width: 360px; padding: 20px; overflow-y: auto; height: 100%; }
.nw-right h3 {
  font-family: var(--serif); font-size: 18px; font-weight: 600; margin-bottom: 8px;
}
.nw-right .nw-meta { font-size: 12px; color: var(--ink-dim); margin-bottom: 4px; }
.nw-right .nw-bucket-list { margin-top: 12px; }
.nw-right .nw-bucket-item {
  padding: 8px 12px; border-radius: 6px; border: 1px solid var(--line);
  margin-bottom: 6px; cursor: pointer; transition: background 0.15s;
}
.nw-right .nw-bucket-item:hover { background: var(--accent-soft); }
.nw-right .nw-bucket-item .nw-b-name {
  font-size: 13px; font-weight: 500; color: var(--ink);
}
.nw-right .nw-bucket-item .nw-b-preview {
  font-size: 11px; color: var(--ink-dim); margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ========== Hover tooltip ========== */
.nw-tooltip {
  position: absolute; pointer-events: none; z-index: 200;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 8px; padding: 10px 14px; box-shadow: var(--shadow);
  font-size: 12px; max-width: 240px; display: none;
}
.nw-tooltip .nw-tt-label { font-weight: 600; font-size: 14px; color: var(--accent); }
.nw-tooltip .nw-tt-meta { color: var(--ink-dim); margin-top: 2px; }

/* ========== Bottom bar ========== */
.nw-bottombar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 20px; background: var(--surface);
  border-top: 1px solid var(--line); position: sticky; bottom: 0; z-index: 100;
}
.nw-bottombar button {
  font-size: 12px; padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--line); background: var(--bg);
  color: var(--ink-dim); cursor: pointer; transition: all 0.15s;
}
.nw-bottombar button:hover { color: var(--accent); border-color: var(--accent); }
.nw-bottombar button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.nw-bottombar .nw-zoom-info { font-size: 11px; color: var(--ink-dim); margin-left: auto; }

/* ========== Loading ========== */
.nw-loading {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 18px; color: var(--ink-dim);
}
</style>
</head>
<body>
<div id="root"></div>

<script src="/v2/theme-system.js"></script>

<script type="text/babel" src="/v2/network/network-app.jsx"></script>
</body>
</html>
