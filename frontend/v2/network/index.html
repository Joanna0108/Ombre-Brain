<!DOCTYPE html>
<html lang="zh-CN" dir="auto">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>记忆网络 — Ombre Brain</title>
<link rel="manifest" href="/v2/manifest.json">
<link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
<link rel="shortcut icon" href="/v2/favicon.ico">
<link rel="apple-touch-icon" href="/v2/favicon-180.png">
<script src="/v2/auth-token.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ===== v2 base CSS (shared with all modules) ===== */
:root {
  --bg:#f4f3f7;--bg-2:#ecebf1;--paper:#fff;--paper-2:#f8f7fb;
  --ink:#1a1922;--ink-2:color-mix(in oklab,var(--ink) 85%,var(--bg) 15%);--ink-3:color-mix(in oklab,var(--ink) 65%,var(--bg) 35%);--ink-4:color-mix(in oklab,var(--ink) 48%,var(--bg) 52%);
  --line:rgba(26,25,34,0.08);--line-2:rgba(26,25,34,0.16);
  --accent:#6e4f9a;--accent-2:#8265b3;--accent-3:var(--accent-a10);
  --gold:#6e4f9a;--gold-soft:#b8a3d8;--rose:#d291b3;--rose-deep:#b06998;--sage:#8a8898;--amber:#6e4f9a;
  --serif:"Cormorant Garamond","Noto Serif SC",Georgia,serif;
  --sans:"Inter","Noto Sans SC",-apple-system,system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;
}
[data-theme="dark"] {
  --bg:#14131c;--bg-2:#1d1c27;--paper:#1d1c27;--paper-2:#1d1c27;
  --ink:#ece9f2;--ink-2:#c8c5d4;--ink-3:#8c889c;--ink-4:#5d5a6e;
  --line:rgba(236,233,242,0.08);--line-2:rgba(236,233,242,0.16);
  --accent:#a78bd0;--accent-2:#c4b3e0;--rose:#d291b3;--rose-deep:#b06998;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 700px at 90% -10%,rgba(176,120,200,0.10),transparent 60%),radial-gradient(900px 700px at -10% 110%,var(--rose-a08),transparent 60%),var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
.ob-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;border-bottom:0.5px solid var(--line);background:rgba(244,243,247,0.7);backdrop-filter:blur(14px);position:sticky;top:0;z-index:50}
[data-theme="dark"] .ob-topbar{background:rgba(20,19,28,0.7)}
.ob-brand{display:flex;align-items:center;gap:14px}
.ob-brand-mark{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 180deg,var(--ink),var(--ink) 50%,transparent 50%,transparent);box-shadow:inset 0 0 0 1.5px var(--ink)}
.ob-brand-name{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:0.02em;color:var(--ink)}
.ob-brand-stats{display:flex;gap:14px;font-size:12px;color:var(--ink-3);padding-left:14px;border-left:0.5px solid var(--line-2);font-family:var(--mono)}
.ob-brand-stats b{color:var(--ink-2);font-weight:600}
.ob-nav{display:flex;gap:4px;padding:0 36px;border-bottom:0.5px solid var(--line);background:rgba(255,255,255,0.4)}
[data-theme="dark"] .ob-nav{background:rgba(29,28,39,0.4)}
.ob-nav a{padding:12px 14px;color:var(--ink-3);text-decoration:none;font-size:13px;border-bottom:1.5px solid transparent;margin-bottom:-0.5px;transition:color .15s;white-space:nowrap}
.ob-nav a:hover{color:var(--ink)}
.ob-nav a.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.ob-dark-btn{appearance:none;border:0;width:36px;height:36px;border-radius:50%;background:var(--paper);border:0.5px solid var(--line-2);color:var(--ink-2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ob-dark-btn:hover{background:var(--ink);color:var(--paper);transform:rotate(20deg)}
.ob-dark-btn.on{background:var(--accent-3);color:var(--accent);border-color:var(--accent)}
.ob-theme-toggle-wrap{position:relative;display:inline-block}
.ob-theme-btn{appearance:none;border:0;width:36px;height:36px;border-radius:50%;background:var(--paper);border:0.5px solid var(--line-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0}
.ob-theme-btn:hover{transform:rotate(20deg);border-color:var(--ink-3)}
.ob-theme-btn-mark{width:16px;height:16px;border-radius:50%;background:conic-gradient(from 0deg,var(--accent),var(--rose),var(--gold),var(--accent));border:0.5px solid var(--ink-4)}

/* ===== Network-specific ===== */
.nw-main{display:flex;height:calc(100vh - 100px);position:relative}
.nw-left{width:260px;min-width:260px;background:var(--paper);border-right:0.5px solid var(--line);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.nw-left h3{font-family:var(--serif);font-size:14px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px}
.nw-left label{font-size:12px;color:var(--ink-3);display:block;margin-bottom:4px}
.nw-left input[type="text"]{width:100%;padding:8px 10px;border:0.5px solid var(--line-2);border-radius:var(--r-sm);font-size:13px;background:var(--bg);color:var(--ink);outline:none}
.nw-left input[type="text"]:focus{border-color:var(--accent)}
.nw-filter-chips{display:flex;flex-wrap:wrap;gap:4px}
.nw-chip{font-size:11px;padding:4px 10px;border-radius:14px;border:0.5px solid var(--line-2);background:var(--bg);color:var(--ink-3);cursor:pointer;transition:all .15s}
.nw-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.nw-stats{font-size:12px;color:var(--ink-3)}.nw-stats span{font-weight:600;color:var(--ink)}
.nw-canvas-wrap{flex:1;position:relative;background:var(--bg);cursor:grab;overflow:hidden}
.nw-canvas-wrap:active{cursor:grabbing}
.nw-canvas-wrap svg{width:100%;height:100%;display:block}
.nw-right{width:0;overflow:hidden;transition:width .25s ease;background:var(--paper);border-left:0.5px solid var(--line)}
.nw-right.open{width:360px}
.nw-right-inner{width:360px;padding:20px;overflow-y:auto;height:100%}
.nw-right h3{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:8px}
.nw-right .nw-meta{font-size:12px;color:var(--ink-3);margin-bottom:4px}
.nw-right .nw-bucket-list{margin-top:12px}
.nw-right .nw-bucket-item{padding:8px 12px;border-radius:var(--r-sm);border:0.5px solid var(--line);margin-bottom:6px;cursor:pointer;transition:background .15s}
.nw-right .nw-bucket-item:hover{background:var(--accent-3)}
.nw-right .nw-bucket-item .nw-b-name{font-size:13px;font-weight:500;color:var(--ink)}
.nw-right .nw-bucket-item .nw-b-preview{font-size:11px;color:var(--ink-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nw-tooltip{position:absolute;pointer-events:none;z-index:200;background:var(--paper);border:0.5px solid var(--line-2);border-radius:var(--r-md);padding:10px 14px;font-size:12px;max-width:240px;display:none}
.nw-tooltip .nw-tt-label{font-weight:600;font-size:14px;color:var(--accent)}
.nw-tooltip .nw-tt-meta{color:var(--ink-3);margin-top:2px}
.nw-bottombar{display:flex;align-items:center;gap:12px;padding:8px 36px;background:var(--paper);border-top:0.5px solid var(--line);position:sticky;bottom:0;z-index:50}
.nw-bottombar button{font-size:12px;padding:5px 12px;border-radius:var(--r-sm);border:0.5px solid var(--line-2);background:var(--bg);color:var(--ink-3);cursor:pointer;transition:all .15s}
.nw-bottombar button:hover{color:var(--accent);border-color:var(--accent)}
.nw-bottombar button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.nw-bottombar .nw-zoom-info{font-size:11px;color:var(--ink-3);margin-left:auto}
.nw-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;color:var(--ink-3)}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel" src="/v2/theme-system.js"></script>
<script type="text/babel" src="/v2/shared-nav.jsx"></script>
<script type="text/babel" src="/v2/network/network-app.jsx"></script>
</body>
</html>
