<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>人生电影 — Ombre Brain</title>
<link rel="manifest" href="/v2/manifest.json">
<link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
<link rel="shortcut icon" href="/v2/favicon.ico">
<script src="/v2/auth-token.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#faf8f5;--surface:#fff;--line:#e8e5df;--ink:#2d2a35;--ink-dim:#8a8796;--accent:#7c6fb8;--accent-soft:#ebe6f7;--gold:#d4a85f;--rose:#d291b3;--serif:'Cormorant Garamond','Noto Serif SC',Georgia,serif;--sans:'Inter',system-ui,-apple-system,sans-serif;--radius:10px;--shadow:0 1px 4px rgba(0,0,0,.06)}
[data-theme="dark"]{--bg:#1d1c27;--surface:#262433;--line:#363348;--ink:#e4e1f0;--ink-dim:#8a8796;--accent:#a78bd0;--accent-soft:#2d2840}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink)}
.rp-topbar{display:flex;align-items:center;gap:6px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.rp-brand{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--accent);margin-right:16px;white-space:nowrap;text-decoration:none}
.rp-topbar a{text-decoration:none;color:var(--ink-dim);font-size:13px;padding:4px 10px;border-radius:6px;transition:color .15s,background .15s;white-space:nowrap}
.rp-topbar a:hover,.rp-topbar a.on{color:var(--accent);background:var(--accent-soft)}
.rp-nav-group{display:flex;gap:2px}.rp-nav-divider{width:1px;height:18px;background:var(--line);margin:0 8px}
.rp-page{max-width:800px;margin:0 auto;padding:40px 20px}
.rp-hd{text-align:center;margin-bottom:32px}
.rp-hd h1{font-family:var(--serif);font-size:32px;font-weight:600}
.rp-hd p{font-size:13px;color:var(--ink-dim);margin-top:6px}
.rp-controls{display:flex;gap:12px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;align-items:center}
.rp-controls input[type="date"]{padding:6px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:var(--surface);color:var(--ink)}
.rp-controls button{padding:8px 20px;border-radius:6px;border:1px solid var(--line);background:var(--accent);color:#fff;font-size:13px;cursor:pointer;font-family:var(--serif);font-weight:600;transition:opacity .15s}
.rp-controls button:hover{opacity:.85}
.rp-controls button:disabled{opacity:.4;cursor:default}
.rp-result{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:32px;line-height:1.9;font-family:var(--serif);font-size:16px;white-space:pre-wrap}
.rp-result .scene{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--line)}
.rp-result .scene:last-child{border-bottom:none}
.rp-result .scene-time{font-size:12px;color:var(--ink-dim);margin-bottom:4px;font-family:var(--sans)}
.rp-loading{text-align:center;padding:60px;color:var(--ink-dim);font-family:var(--serif);font-size:18px}
.rp-error{text-align:center;padding:40px;color:var(--rose)}
</style>
</head>
<body><div id="root"></div>
<script src="/v2/theme-system.js"></script>
<script type="text/babel" src="/v2/replay/replay-app.jsx"></script>
</body>
</html>
