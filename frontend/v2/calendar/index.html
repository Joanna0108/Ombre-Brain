<!DOCTYPE html>
<html lang="zh-CN" dir="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日历 — Ombre Brain</title>
<link rel="manifest" href="/v2/manifest.json">
<link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
<link rel="shortcut icon" href="/v2/favicon.ico">
<link rel="apple-touch-icon" href="/v2/favicon-180.png">
<script src="/v2/auth-token.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root {
  --bg: #faf8f5; --surface: #ffffff; --line: #e8e5df;
  --ink: #2d2a35; --ink-dim: #8a8796; --accent: #7c6fb8;
  --accent-soft: #ebe6f7; --gold: #d4a85f; --rose: #d291b3;
  --serif: 'Cormorant Garamond', 'Noto Serif SC', Georgia, serif;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg: #1d1c27; --surface: #262433; --line: #363348;
  --ink: #e4e1f0; --ink-dim: #8a8796; --accent: #a78bd0;
  --accent-soft: #2d2840;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); }

/* Top Nav */
.cal-topbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 20px; background: var(--surface);
  border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 100;
  flex-wrap: wrap;
}
.cal-brand {
  font-family: var(--serif); font-size: 18px; font-weight: 600;
  color: var(--accent); margin-right: 16px; white-space: nowrap; text-decoration: none;
}
.cal-topbar a {
  text-decoration: none; color: var(--ink-dim); font-size: 13px;
  padding: 4px 10px; border-radius: 6px; transition: color 0.15s, background 0.15s; white-space: nowrap;
}
.cal-topbar a:hover, .cal-topbar a.on { color: var(--accent); background: var(--accent-soft); }
.cal-nav-group { display: flex; gap: 2px; }
.cal-nav-divider { width: 1px; height: 18px; background: var(--line); margin: 0 8px; }

/* Page header */
.cal-page-hd {
  text-align: center; padding: 24px 20px 8px;
}
.cal-page-hd h1 { font-family: var(--serif); font-size: 28px; font-weight: 600; }
.cal-page-hd p { font-size: 13px; color: var(--ink-dim); margin-top: 4px; }

/* Month navigation */
.cal-month-nav {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  padding: 8px 20px 20px;
}
.cal-month-nav button {
  font-size: 13px; padding: 6px 16px; border-radius: 6px;
  border: 1px solid var(--line); background: var(--surface);
  color: var(--ink-dim); cursor: pointer; transition: all 0.15s;
}
.cal-month-nav button:hover { color: var(--accent); border-color: var(--accent); }
.cal-month-nav .cal-month-title {
  font-family: var(--serif); font-size: 22px; font-weight: 600; min-width: 200px; text-align: center;
}

/* Calendar grid */
.cal-grid-wrap { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; }
.cal-weekrow {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  text-align: center; font-size: 11px; color: var(--ink-dim);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
}
.cal-cell {
  aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--line);
  background: var(--surface); display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: default;
  transition: all 0.15s; position: relative; min-height: 60px;
}
.cal-cell.ph { background: transparent; border-color: transparent; cursor: default; }
.cal-cell.has-data { cursor: pointer; }
.cal-cell.has-data:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.cal-cell .d { font-size: 13px; font-weight: 500; color: var(--ink); }
.cal-cell .n {
  font-size: 11px; color: var(--ink-dim); margin-top: 2px;
  background: var(--accent-soft); padding: 1px 6px; border-radius: 8px;
}
.cal-cell.l1 { background: #f3f0fa; }
.cal-cell.l2 { background: #e8e2f7; }
.cal-cell.l3 { background: #d9cef2; }
.cal-cell.l4 { background: #c9b8ec; }
[data-theme="dark"] .cal-cell.l1 { background: #2a2540; }
[data-theme="dark"] .cal-cell.l2 { background: #322d4a; }
[data-theme="dark"] .cal-cell.l3 { background: #3d3658; }
[data-theme="dark"] .cal-cell.l4 { background: #4a3f68; }
.cal-cell.today { border-color: var(--accent); border-width: 2px; }
.cal-cell.hi { border-left: 3px solid var(--rose); }
.cal-cell.unread { border-left: 3px solid var(--gold); }
.cal-cell.read { border-left: 3px solid var(--accent); }

/* Day detail panel */
.cal-day-panel {
  position: fixed; right: 0; top: 0; bottom: 0; width: 380px;
  background: var(--surface); border-left: 1px solid var(--line);
  z-index: 200; overflow-y: auto; padding: 24px;
  transform: translateX(100%); transition: transform 0.25s ease;
}
.cal-day-panel.open { transform: translateX(0); }
.cal-day-panel h3 {
  font-family: var(--serif); font-size: 20px; font-weight: 600; margin-bottom: 4px;
}
.cal-day-panel .cal-day-meta { font-size: 12px; color: var(--ink-dim); margin-bottom: 16px; }
.cal-day-panel .cal-close {
  position: absolute; top: 16px; right: 16px;
  font-size: 18px; cursor: pointer; color: var(--ink-dim);
  background: none; border: none;
}

/* Memory item in day panel */
.cal-mem-item {
  padding: 10px 14px; border-radius: 8px; border: 1px solid var(--line);
  margin-bottom: 8px; cursor: pointer; transition: background 0.15s;
}
.cal-mem-item:hover { background: var(--accent-soft); }
.cal-mem-item .cal-mem-title { font-size: 13px; font-weight: 500; }
.cal-mem-item .cal-mem-preview { font-size: 11px; color: var(--ink-dim); margin-top: 3px; }
.cal-mem-item .cal-mem-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.cal-mem-item .cal-mem-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: var(--accent-soft); color: var(--accent);
}

/* Mode tabs */
.cal-mode-tabs { display: flex; gap: 8px; padding: 0 20px 16px; justify-content: center; }
.cal-mode-tabs button {
  font-size: 12px; padding: 5px 14px; border-radius: 6px;
  border: 1px solid var(--line); background: var(--bg);
  color: var(--ink-dim); cursor: pointer; transition: all 0.15s;
}
.cal-mode-tabs button.on { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Loading */
.cal-loading { text-align: center; padding: 60px; color: var(--ink-dim); font-family: var(--serif); font-size: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="/v2/theme-system.js"></script>
<script type="text/babel" src="/v2/calendar/calendar-app.jsx"></script>
</body>
</html>
